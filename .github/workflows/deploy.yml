name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name to lowercase
        id: repo
        run: echo "NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.NAME }}:latest
          build-args: |
             VITE_API_URL=/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          # key: ${{ secrets.SSH_KEY }} # Usage of key commented out in favor of password as per user request context
          script: |
            set -e
            
            # Navigate to deployment directory (matching backend setup)
            mkdir -p /opt/qazcode
            cd /opt/qazcode

            # Login to GHCR on server
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            
            # Create a localized docker-compose file on the server for the frontend
            cat <<EOF > docker-compose.frontend.yml
            services:
              frontend:
                image: ghcr.io/${{ steps.repo.outputs.NAME }}:latest
                container_name: qazdocs-frontend
                ports:
                  - "3000:80"
                restart: unless-stopped
                networks:
                  - qazcode_network

            networks:
              qazcode_network:
                external: true
            EOF

            # Pull and restart using the separate compose file to avoid conflict with backend's main compose
            docker compose -f docker-compose.frontend.yml pull
            docker compose -f docker-compose.frontend.yml up -d --remove-orphans
